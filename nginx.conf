# Nginx configuration for serving the React SPA
# Handles client-side routing (react-router) and proxies /api calls to the backend

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression for faster page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # ── Proxy all /api requests to the Spring Boot backend ──────────────
    # The service name "backend" resolves inside Docker Compose network
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for long-running payment/upload requests
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ── Proxy /uploads (file serving from Spring Boot) ──────────────────
    location /uploads/ {
        proxy_pass http://backend:8080;
    }

    # ── Serve React SPA ─────────────────────────────────────────────────
    # Try the exact file first; if not found, fall back to index.html
    # This is required for react-router client-side navigation to work
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (JS, CSS, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;
}
